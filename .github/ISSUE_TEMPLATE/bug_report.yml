name: Bug Report
description: Report a reproducible AppVitals issue.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction Steps
      description: Include a minimal sample when possible.
    validations:
      required: true
  - type: input
    id: versions
    attributes:
      label: Versions
      placeholder: AppVitals, Xcode, iOS, Swift
    validations:
      required: true
