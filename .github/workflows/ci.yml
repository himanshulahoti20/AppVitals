name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: Swift Test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app
      - name: Build and test
        run: swift test

  lint:
    name: Lint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Install tools
        run: brew install swiftlint swiftformat
      - name: SwiftFormat lint
        run: swiftformat --lint .
      - name: SwiftLint
        run: swiftlint lint --strict
